workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build & TestFlight

    environment:
      node: 20
      xcode: latest

      groups:
        - app_store # API key group

      ios_signing:
        certificates:
          - Jackson
        provisioning_profiles:
          - Jackson

      vars:
        BUNDLE_ID: com.jackson.rewards.app
        TEAM_ID: HNLHZ72LJL
        PROFILE_NAME: Jackson
        NEXT_PUBLIC_APPLOVIN_SDK_KEY: lh6M1G2AwbIq5_eZhJe3oflwyCkw_BbRghc3KgcdrArB_pQ0SDFuPEpJmL6cNATcIDu6ZNkbz7niRHBt7T0lV_

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Clean old pods
        script: |
          rm -rf ios/App/Pods ios/App/Podfile.lock

      - name: Build frontend
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Fix Xcode project settings
        script: |
          cd ios/App
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            if target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.jackson.rewards.app'
                config.build_settings['DEVELOPMENT_TEAM'] = 'HNLHZ72LJL'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Jackson'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                config.build_settings['CURRENT_PROJECT_VERSION'] = '113'
              end
            end
          end
          project.save
          "

      - name: Fix Info.plist permissions
        script: |
          PLIST="ios/App/App/Info.plist"
          plutil -replace NSPhotoLibraryUsageDescription -string "We need access to your photos to upload profile pictures." "$PLIST"
          plutil -replace NSCameraUsageDescription -string "We need camera for QR scanning." "$PLIST"
          plutil -replace NSLocationWhenInUseUsageDescription -string "We need location to show nearby rewards." "$PLIST"
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "We notify you near reward locations." "$PLIST"
          plutil -replace NSHealthUpdateUsageDescription -string "Used for health and fitness features integration." "$PLIST"
          plutil -replace NSUserTrackingUsageDescription -string "Your data is used to show relevant ads and improve your experience." "$PLIST"
          plutil -replace GADApplicationIdentifier -string "ca-app-pub-2800391972465887~6894931313" "$PLIST"
          plutil -replace AppLovinSdkKey -string "lh6M1G2AwbIq5_eZhJe3oflwyCkw_BbRghc3KgcdrArB_pQ0SDFuPEpJmL6cNATcIDu6ZNkbz7niRHBt7T0lV_" "$PLIST"
          plutil -replace NSFaceIDUsageDescription -string "FaceID for secure login." "$PLIST"

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        script: |
          cd ios/App
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
