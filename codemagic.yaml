workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build & TestFlight

    environment:
      node: 20
      xcode: latest

      groups:
        - app_store # API key group

      ios_signing:
        certificates:
          - Jackson
        provisioning_profiles:
          - Jackson

      vars:
        BUNDLE_ID: com.jackson.rewards.app
        TEAM_ID: HNLHZ72LJL
        PROFILE_NAME: Jackson
        CURRENT_PROJECT_VERSION: "114"
        NEXT_PUBLIC_API_URL: "https://rewardsuatapi.hireagent.co"
        NEXT_PUBLIC_VERISOUL_API_KEY: "9sxeYwvVRwwI2fKL1ubo4euZ2zXNstA6cqnqDvN0"
        NEXT_PUBLIC_VERISOUL_BASE_URL: "https://api.prod.verisoul.ai"
        NEXT_PUBLIC_VERISOUL_PROJECT_ID: "579b117f-385b-44b0-95e0-e66a261cdf83"
        NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyATHdTHrDds-jPOjKeZF3hbBjtz3q_BiOU"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "jackson-3c4bc.firebaseapp.com"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "jackson-3c4bc"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "jackson-3c4bc.firebasestorage.app"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "278411577622"
        NEXT_PUBLIC_FIREBASE_APP_ID: "1:278411577622:web:8a8d3513f02e8fcc4c2837"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAACpIw95M6r8lJWnI"
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_51SBUH3PJY1SybSwUCQEkb8qM1YDRgbKitMYFGpRDcryE1AFDPIHoI4ovL61hITqeaoFeNgDkFlZ5tBV7rFv7B3U0008lDMyvfe"
        NEXT_PUBLIC_GOOGLE_CLOUD_PROJECT_NUMBER: "278411577622"
        NEXT_PUBLIC_APP_VERSION: "V0.1.0"
        NEXT_PUBLIC_APPLOVIN_SDK_KEY: "lh6M1G2AwbIq5_eZhJe3oflwyCkw_BbRghc3KgcdrArB_pQ0SDFuPEpJmL6cNATcIDu6ZNkbz7niRHBt7T0lV_"
        NEXT_PUBLIC_APPLOVIN_AD_UNIT_IOS_REWARDED: "b3bf29fc650db20d"
        NEXT_PUBLIC_APPLOVIN_AD_UNIT_ANDROID_REWARDED: "6e87990ef5f63cce"
        NEXT_PUBLIC_ADMOB_APP_ID_IOS: "ca-app-pub-2800391972465887~6894931313"
        NEXT_PUBLIC_ADMOB_APP_ID_ANDROID: "ca-app-pub-2800391972465887~5310386906"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Clean old pods
        script: |
          rm -rf ios/App/Pods ios/App/Podfile.lock

      - name: Build frontend
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Fix Xcode project settings
        script: |
          cd ios/App
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          project.targets.each do |target|
            if target.name == 'App'
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.jackson.rewards.app'
                config.build_settings['DEVELOPMENT_TEAM'] = 'HNLHZ72LJL'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Jackson'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                config.build_settings['CURRENT_PROJECT_VERSION'] = ENV['CURRENT_PROJECT_VERSION'] || '114'
              end
            end
          end
          project.save
          "

      - name: Fix Info.plist permissions
        script: |
          PLIST="ios/App/App/Info.plist"
          plutil -replace NSPhotoLibraryUsageDescription -string "We need access to your photos to upload profile pictures." "$PLIST"
          plutil -replace NSCameraUsageDescription -string "We need camera for QR scanning." "$PLIST"
          plutil -replace NSLocationWhenInUseUsageDescription -string "We need location to show nearby rewards." "$PLIST"
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "We notify you near reward locations." "$PLIST"
          plutil -replace NSHealthUpdateUsageDescription -string "Used for health and fitness features integration." "$PLIST"
          plutil -replace NSUserTrackingUsageDescription -string "Your data is used to show relevant ads and improve your experience." "$PLIST"
          plutil -replace GADApplicationIdentifier -string "ca-app-pub-2800391972465887~6894931313" "$PLIST"
          plutil -replace AppLovinSdkKey -string "lh6M1G2AwbIq5_eZhJe3oflwyCkw_BbRghc3KgcdrArB_pQ0SDFuPEpJmL6cNATcIDu6ZNkbz7niRHBt7T0lV_" "$PLIST"
          plutil -replace NSFaceIDUsageDescription -string "FaceID for secure login." "$PLIST"

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS archive
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        script: |
          cd ios/App
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
